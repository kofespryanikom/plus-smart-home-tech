syntax = "proto3";

package telemetry.messages.hub.device;

option java_package = "ru.yandex.practicum.grpc.telemetry.messages.hub.device";
option java_multiple_files = true;

enum DeviceTypeProto {
  MOTION_SENSOR = 0;
  TEMPERATURE_SENSOR = 1;
  LIGHT_SENSOR = 2;
  CLIMATE_SENSOR = 3;
  SWITCH_SENSOR = 4;
}