syntax = "proto3";

package telemetry.messages.hub.scenario;

import "telemetry/messages/hub/scenario/scenario_condition.proto";
import "telemetry/messages/hub/scenario/device_action.proto";

option java_package = "ru.yandex.practicum.grpc.telemetry.messages.hub.scenario";
option java_multiple_files = true;

message ScenarioAddedEventProto {
  string name = 1;
  repeated ScenarioConditionProto condition = 2;
  repeated DeviceActionProto action = 3;
}