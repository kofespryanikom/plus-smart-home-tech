syntax = "proto3";

package telemetry.messages.hub.device;

import "telemetry/messages/hub/device/device_type.proto";

option java_package = "ru.yandex.practicum.grpc.telemetry.messages.hub.device";
option java_multiple_files = true;

message DeviceAddedEventProto {
  string id = 1;
